{% extends 'base.html' %}

{% block title %}Удалить новость{% endblock %}

{% block content %}
<div class="form-container" style="text-align: center;">
    <h1 style="margin-bottom: 1rem;">Удалить новость?</h1>
    <p>Вы уверены, что хотите удалить новость <strong>"{{ news.title }}"</strong>?</p>
    <p>Это действие невозможно отменить.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'blog:news_detail' news.pk %}" class="btn btn-outline">Отмена</a>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="form-container">
    <h1 style="margin-bottom: 1.5rem;">Смена пароля</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <small style="color: red;">{{ field.errors }}</small>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Изменить пароль</button>
        <a href="{% url 'users:profile' %}" class="btn btn-outline">Отмена</a>
    </form>
</div>
{% endblock %}
